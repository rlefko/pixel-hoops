name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint, Typecheck, Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - Checkout:
        uses: actions/checkout@v4
      - Setup Node.js:
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - Install dependencies:
        run: npm ci
      - Lint:
        run: npx oxlint
      - Typecheck:
        run: npx tsgo --project tsconfig.json
      - Build (web):
        run: npx expo export --platform web
